<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    
    <!-- Flow Gradient -->
    <linearGradient id="flow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Node Glow Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <drop-shadow dx="0" dy="4" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.25" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <drop-shadow dx="0" dy="4" stdDeviation="6" flood-color="#10b981" flood-opacity="0.25" />
    </filter>
    <filter id="glow-rose" x="-20%" y="-20%" width="140%" height="140%">
      <drop-shadow dx="0" dy="4" stdDeviation="6" flood-color="#f43f5e" flood-opacity="0.2" />
    </filter>

    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#10b981" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 800; fill: #ffffff; }
    .subtitle { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; fill: #94a3b8; }
    .label { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; font-weight: 600; fill: #f1f5f9; }
    .sublabel { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; fill: #94a3b8; }
    .conn-text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 10px; font-weight: bold; fill: #cbd5e1; }
    .box { rx: 12px; stroke-width: 1.5px; }
    .pipe-step { rx: 6px; fill: #1e293b; stroke: #334155; stroke-width: 1px; }
    .bg { fill: url(#bg-grad); }
  </style>

  <!-- Background -->
  <rect width="1000" height="650" class="bg" />

  <!-- Header -->
  <text x="40" y="45" class="title">CI/CD Static Website Architecture</text>
  <text x="40" y="68" class="subtitle">Git-triggered pipeline with staging checks, quality gates, and AWS S3/CloudFront Blue-Green deployment</text>

  <!-- ================= DEVELOPER SECTION ================= -->
  <g transform="translate(40, 160)">
    <rect width="120" height="90" class="box" fill="#0f172a" stroke="#6366f1" filter="url(#glow)" />
    <text x="60" y="35" text-anchor="middle" class="label">Developer</text>
    <text x="60" y="55" text-anchor="middle" class="sublabel">Git Commit &amp; Push</text>
    <text x="60" y="70" text-anchor="middle" class="sublabel">to 'main' branch</text>
  </g>

  <!-- Flow Arrow: Dev to Github Actions -->
  <path d="M 160 205 L 210 205" fill="none" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)" />
  <text x="185" y="195" text-anchor="middle" class="conn-text">Push</text>

  <!-- ================= GITHUB ACTIONS PIPELINE ================= -->
  <g transform="translate(220, 110)">
    <!-- Container Box -->
    <rect width="260" height="420" class="box" fill="#0b0f19" stroke="#334155" />
    <rect width="260" height="40" class="box" fill="#1e1b4b" stroke="none" />
    <text x="130" y="25" text-anchor="middle" class="label">GitHub Actions CI Pipeline</text>

    <!-- Pipeline Steps -->
    <g transform="translate(20, 60)">
      <!-- Step 1: Install & Build -->
      <rect width="220" height="50" class="pipe-step" />
      <text x="20" y="25" class="label">1. Install &amp; Build</text>
      <text x="20" y="40" class="sublabel">npm ci &amp;&amp; npm run build (Vite)</text>
      
      <!-- Step 2: Linting -->
      <rect y="65" width="220" height="50" class="pipe-step" />
      <text x="20" y="90" class="label">2. Code Linting</text>
      <text x="20" y="105" class="sublabel">ESLint, Stylelint, HTMLHint</text>

      <!-- Step 3: Playwright E2E Tests -->
      <rect y="130" width="220" height="50" class="pipe-step" />
      <text x="20" y="155" class="label">3. E2E Smoke Tests</text>
      <text x="20" y="170" class="sublabel">Playwright headless testing</text>

      <!-- Step 4: SonarCloud Scan -->
      <rect y="195" width="220" height="50" class="pipe-step" />
      <text x="20" y="220" class="label">4. Code Quality Gate</text>
      <text x="20" y="235" class="sublabel">SonarCloud cloud scanner</text>

      <!-- Step 5: Security Scans -->
      <rect y="260" width="220" height="50" class="pipe-step" />
      <text x="20" y="285" class="label">5. Security Audit &amp; Trivy</text>
      <text x="20" y="300" class="sublabel">npm audit &amp; Trivy fs scan</text>

      <!-- Step 6: Artifact Archiving -->
      <rect y="325" width="220" height="35" class="pipe-step" />
      <text x="20" y="347" class="label">6. Publish Build Artifact</text>
    </g>
  </g>

  <!-- Flow Arrow: GHA to Staging S3 -->
  <path d="M 480 205 L 530 205 L 530 170 L 570 170" fill="none" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)" />
  <text x="525" y="150" text-anchor="middle" class="conn-text">Auto Deploy</text>

  <!-- ================= STAGING ENV ================= -->
  <g transform="translate(580, 110)">
    <rect width="180" height="110" class="box" fill="#022c22" stroke="#10b981" filter="url(#glow-green)" />
    <text x="90" y="30" text-anchor="middle" class="label">Staging Env</text>
    <text x="20" y="60" class="sublabel">S3: staging-bucket</text>
    <text x="20" y="80" class="sublabel">CF: staging-distribution</text>
    <text x="20" y="95" class="sublabel">URL: staging.cloudfront.net</text>
  </g>

  <!-- Staging post-deploy check -->
  <path d="M 760 165 L 810 165" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrow-green)" />
  <text x="785" y="155" text-anchor="middle" class="conn-text">Smoke Check</text>

  <g transform="translate(820, 140)">
    <circle cx="25" cy="25" r="20" fill="#022c22" stroke="#10b981" />
    <text x="25" y="29" text-anchor="middle" class="label" fill="#10b981">✓</text>
    <text x="25" y="60" text-anchor="middle" class="sublabel">HTTP 200</text>
  </g>

  <!-- ================= MANUAL APPROVAL GATE ================= -->
  <g transform="translate(580, 245)">
    <polygon points="90,10 170,55 90,100 10,55" fill="#311018" stroke="#f43f5e" stroke-width="1.5" filter="url(#glow-rose)" />
    <text x="90" y="52" text-anchor="middle" class="label" fill="#f43f5e">GitHub Env</text>
    <text x="90" y="68" text-anchor="middle" class="sublabel">Manual Gate</text>
  </g>
  <path d="M 480 320 L 580 300" fill="none" stroke="#cbd5e1" stroke-dasharray="3" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Approval trigger arrow -->
  <path d="M 670 348 L 670 380" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <text x="720" y="368" text-anchor="middle" class="conn-text" fill="#10b981">Approved</text>

  <!-- ================= PRODUCTION BLUE-GREEN ================= -->
  <g transform="translate(520, 390)">
    <rect width="320" height="210" class="box" fill="#0f172a" stroke="#475569" stroke-dasharray="4" />
    <text x="160" y="25" text-anchor="middle" class="label" fill="#cbd5e1">Production S3 Targets</text>

    <!-- Blue Bucket -->
    <g transform="translate(20, 45)">
      <rect width="120" height="70" class="box" fill="#1e3a8a" stroke="#3b82f6" />
      <text x="60" y="30" text-anchor="middle" class="label">S3: Prod Blue</text>
      <text x="60" y="50" text-anchor="middle" class="sublabel" fill="#93c5fd">Active Origin</text>
    </g>

    <!-- Green Bucket -->
    <g transform="translate(180, 45)">
      <rect width="120" height="70" class="box" fill="#064e3b" stroke="#10b981" />
      <text x="60" y="30" text-anchor="middle" class="label">S3: Prod Green</text>
      <text x="60" y="50" text-anchor="middle" class="sublabel" fill="#6ee7b7">Inactive</text>
    </g>
    
    <!-- SSM Color Indicator -->
    <rect x="70" y="140" width="180" height="50" class="box" fill="#1e293b" stroke="#cbd5e1" stroke-width="1" />
    <text x="160" y="158" text-anchor="middle" class="sublabel">AWS SSM Parameter Store</text>
    <text x="160" y="178" text-anchor="middle" class="label" fill="#f8fafc">/site/.../prod-active-color = &quot;blue&quot;</text>
  </g>

  <!-- Switch routing indicator -->
  <path d="M 660 500 L 610 500 L 610 460" fill="none" stroke="#3b82f6" stroke-dasharray="3" stroke-width="1.5" />
  <path d="M 700 500 L 730 500 L 730 460" fill="none" stroke="#10b981" stroke-dasharray="3" stroke-width="1.5" />

  <!-- ================= PRODUCTION CLOUDFRONT CDN ================= -->
  <g transform="translate(880, 390)">
    <rect width="90" height="110" class="box" fill="#171b26" stroke="#6366f1" filter="url(#glow)" />
    <text x="45" y="30" text-anchor="middle" class="label">CloudFront</text>
    <text x="45" y="50" text-anchor="middle" class="label">Prod CDN</text>
    <text x="45" y="80" text-anchor="middle" class="sublabel" fill="#818cf8">Switches</text>
    <text x="45" y="95" text-anchor="middle" class="sublabel" fill="#818cf8">Target</text>
  </g>

  <!-- Flow from Blue/Green buckets to Production CloudFront -->
  <path d="M 640 435 L 880 435" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)" />
  <text x="860" y="425" text-anchor="middle" class="conn-text" fill="#3b82f6">Active Route</text>

  <!-- Flow to users -->
  <path d="M 925 500 L 925 560" fill="none" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)" />
  
  <g transform="translate(875, 570)">
    <rect width="100" height="40" class="box" fill="#0f172a" stroke="#cbd5e1" stroke-width="1" />
    <text x="50" y="24" text-anchor="middle" class="label">End Users</text>
  </g>
</svg>
